<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRIMSON</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
}

body {
  background: #050008;
  overflow-x: hidden;
  color: #ff2a3d;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  text-align: center;
  padding-top: 80px;
}

h1 {
  font-size: 72px;
  letter-spacing: 12px;
  color: #ff1e2f;
  text-shadow: 0 0 10px #ff1e2f, 0 0 40px #8b0012;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #ff5a6a;
  opacity: 0.9;
}

/* MAIN DROPDOWNS */
.dropdown {
  width: 60%;
  margin: 30px auto;
}

/* CYBER BUTTON */
.dropdown button {
  width: 100%;
  padding: 18px 22px;
  background: linear-gradient(135deg, rgba(20,0,10,0.95), rgba(40,0,15,0.85));
  color: #ff2a3d;
  font-size: 20px;
  border: 1px solid rgba(255,30,47,0.6);
  cursor: pointer;
  text-align: left;

  clip-path: polygon(0 0, 92% 0, 100% 35%, 100% 100%, 8% 100%, 0 65%);
  position: relative;
  overflow: hidden;

  box-shadow: 0 0 15px rgba(255,30,47,0.3);
  transition: 0.3s;
}

.dropdown button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 30px rgba(255,30,47,0.6);
}

/* CONTENT */
.dropdown-content {
  display: none;
  background: rgba(20,0,10,0.92);
  padding: 12px;
  border-left: 2px solid #ff1e2f;
}

/* ITEMS */
.item {
  padding: 10px;
  margin: 6px 0;
  border-left: 2px solid #ff1e2f;
  cursor: pointer;
  color: #ff8a93;
}

/* ===== NESTED GAME DROPDOWNS ===== */
.sub-dropdown {
  margin: 8px 0;
}

.sub-btn {
  width: 100%;
  padding: 12px;
  background: rgba(40,0,15,0.7);
  color: #ff4b5c;
  border: 1px solid rgba(255,30,47,0.4);
  cursor: pointer;
  text-align: left;
  clip-path: polygon(0 0, 90% 0, 100% 40%, 100% 100%, 10% 100%, 0 60%);
  transition: 0.3s;
}

.sub-btn:hover {
  box-shadow: 0 0 20px rgba(255,30,47,0.5);
  transform: scale(1.02);
}

.sub-content {
  display: none;
  padding-left: 10px;
  margin-top: 5px;
  border-left: 2px solid rgba(255,30,47,0.5);
}

/* scanlines */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,30,47,0.04),
    rgba(255,30,47,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>CRIMSON</h1>
  <div class="subtitle">Tools that you ACTUALLY need.</div>

  <!-- GENERAL -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ General</button>
    <div class="dropdown-content">
      <div class="item">IP Lookup Tool</div>
      <div class="item">Password Strength Checker</div>
      <div class="item">Hash Generator</div>
    </div>
  </div>

  <!-- GAMES (NOW NESTED) -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Games</button>
    <div class="dropdown-content">

      <!-- ROBLOX -->
      <div class="sub-dropdown">
        <button class="sub-btn" onclick="toggleSub(this)">▶ ROBLOX</button>
        <div class="sub-content">
          <div class="item">Server Finder</div>
          <div class="item">Game Stats Viewer</div>
        </div>
      </div>

      <!-- MINECRAFT -->
      <div class="sub-dropdown">
        <button class="sub-btn" onclick="toggleSub(this)">▶ MINECRAFT</button>
        <div class="sub-content">
          <div class="item">Seed Analyzer</div>
          <div class="item">Mod Finder</div>
        </div>
      </div>

      <!-- FORTNITE -->
      <div class="sub-dropdown">
        <button class="sub-btn" onclick="toggleSub(this)">▶ FORTNITE</button>
        <div class="sub-content">
          <div class="item">Skin Viewer</div>
          <div class="item">Stats Tracker</div>
        </div>
      </div>

      <!-- GEOMETRY DASH -->
      <div class="sub-dropdown">
        <button class="sub-btn" onclick="toggleSub(this)">▶ GEOMETRY DASH</button>
        <div class="sub-content">
          <div class="item">Level Browser</div>
          <div class="item">Wave Practice Tools</div>
        </div>
      </div>

    </div>
  </div>

  <!-- FUN -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Fun</button>
    <div class="dropdown-content">
      <div class="item">Matrix Text Generator</div>
      <div class="item">Glitch Text Maker</div>
      <div class="item">ASCII Art Tool</div>
    </div>
  </div>
</div>

<script>

/* MAIN DROPDOWN */
function toggle(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* SUB DROPDOWN */
function toggleSub(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(5, 0, 8, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ff1e2f";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>
