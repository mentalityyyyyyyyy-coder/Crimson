<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #050505;
  color: #ff003c;
  font-family: 'JetBrains Mono', monospace;
  overflow-x: hidden;
}

/* grid background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(255,0,60,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,60,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: move 12s linear infinite;
  z-index: -2;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(40px); }
}

.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,0,60,0.15), transparent 70%);
  z-index: -1;
}

/* header */
.header {
  text-align: center;
  margin-top: 8vh;
}

.title {
  font-size: 60px;
  letter-spacing: 6px;
  position: relative;
  display: inline-block;
}

.title::before,
.title::after {
  content: "CRIMSON";
  position: absolute;
  left: 0;
}

.title::before {
  color: cyan;
  transform: translateX(-2px);
  animation: glitch1 2s infinite;
}

.title::after {
  color: magenta;
  transform: translateX(2px);
  animation: glitch2 2s infinite;
}

@keyframes glitch1 {
  0%,100% { clip-path: inset(0 0 0 0); }
  50% { clip-path: inset(0 0 60% 0); }
}

@keyframes glitch2 {
  0%,100% { clip-path: inset(0 0 0 0); }
  50% { clip-path: inset(60% 0 0 0); }
}

.subtitle {
  color: #aaa;
  margin-top: 10px;
}

/* dropdown container */
.menu {
  width: 60%;
  margin: 50px auto;
}

/* dropdown box */
.dropdown {
  border: 1px solid #ff003c;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 15px #ff003c33;
}

.dropdown-header {
  padding: 15px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
}

.dropdown-header:hover {
  background: rgba(255,0,60,0.1);
}

.arrow {
  transition: transform 0.3s;
}

/* content */
.dropdown-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  padding: 0 15px;
  color: #aaa;
}

/* active state */
.dropdown.active .dropdown-content {
  max-height: 200px;
  padding-bottom: 15px;
}

.dropdown.active .arrow {
  transform: rotate(180deg);
}

/* binary strip */
.binary {
  text-align: center;
  color: #ff003c55;
  margin-top: 20px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="header">
  <div class="title">CRIMSON</div>
  <div class="subtitle">the tools you ACTUALLY need.</div>
</div>

<div class="binary" id="binary"></div>

<div class="menu">

  <div class="dropdown">
    <div class="dropdown-header">
      General
      <span class="arrow">▼</span>
    </div>
    <div class="dropdown-content">
      Scanner<br>
      Analyzer<br>
      Logs
    </div>
  </div>

  <div class="dropdown">
    <div class="dropdown-header">
      Games
      <span class="arrow">▼</span>
    </div>
    <div class="dropdown-content">
      Mini Games<br>
      Tournaments<br>
      Sandbox Tools
    </div>
  </div>

  <div class="dropdown">
    <div class="dropdown-header">
      Fun
      <span class="arrow">▼</span>
    </div>
    <div class="dropdown-content">
      Random Generator<br>
      Memes<br>
      Experiments
    </div>
  </div>

</div>

<script>
// dropdown logic
document.querySelectorAll('.dropdown').forEach(drop => {
  drop.querySelector('.dropdown-header').addEventListener('click', () => {
    drop.classList.toggle('active');
  });
});

// binary animation
const bin = document.getElementById("binary");

function randomBinary() {
  let str = "";
  for (let i = 0; i < 50; i++) {
    str += Math.random() > 0.5 ? "1" : "0";
  }
  return str;
}

setInterval(() => {
  bin.textContent = randomBinary();
}, 200);
</script>

</body>
</html>
