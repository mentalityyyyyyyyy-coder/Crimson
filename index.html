<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRIMSON</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
}

body {
  background: #05010a;
  overflow-x: hidden;
  color: #00fff2;
}

/* ===== Binary Background ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* ===== Main Container ===== */
.container {
  text-align: center;
  padding-top: 80px;
}

/* ===== Title ===== */
h1 {
  font-size: 70px;
  letter-spacing: 10px;
  color: #ff003c;
  text-shadow:
    0 0 10px #ff003c,
    0 0 20px #ff003c,
    0 0 40px #ff003c;
  animation: glow 2s infinite alternate;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #00fff2;
  opacity: 0.8;
}

/* ===== Glow Animation ===== */
@keyframes glow {
  from { text-shadow: 0 0 10px #ff003c; }
  to { text-shadow: 0 0 30px #ff003c, 0 0 60px #ff003c; }
}

/* ===== Dropdown Boxes ===== */
.dropdown {
  width: 60%;
  margin: 30px auto;
  border: 1px solid #00fff2;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 15px #00fff2;
  transition: 0.3s;
}

.dropdown:hover {
  box-shadow: 0 0 30px #00fff2;
  transform: scale(1.02);
}

.dropdown button {
  width: 100%;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  color: #00fff2;
  border: none;
  font-size: 20px;
  cursor: pointer;
  text-align: left;
}

.dropdown-content {
  display: none;
  background: rgba(10,10,20,0.9);
  padding: 15px;
  animation: slide 0.3s ease-in-out;
}

@keyframes slide {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Links placeholder */
.item {
  padding: 10px;
  margin: 5px 0;
  border-left: 2px solid #ff003c;
  text-align: left;
  cursor: pointer;
}

.item:hover {
  background: rgba(255,0,60,0.1);
}

/* small scanline effect */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>CRIMSON</h1>
  <div class="subtitle">Tools that you ACTUALLY need.</div>

  <!-- GENERAL -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ General</button>
    <div class="dropdown-content">
      <div class="item">IP Lookup Tool</div>
      <div class="item">Password Strength Checker</div>
      <div class="item">Hash Generator</div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Games</button>
    <div class="dropdown-content">
      <div class="item">Cyber Escape Puzzle</div>
      <div class="item">Terminal Hacker Sim</div>
      <div class="item">Code Guess Game</div>
    </div>
  </div>

  <!-- FUN -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Fun</button>
    <div class="dropdown-content">
      <div class="item">Matrix Text Generator</div>
      <div class="item">Glitch Text Maker</div>
      <div class="item">ASCII Art Tool</div>
    </div>
  </div>
</div>

<script>
// Dropdown toggle
function toggle(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* ===== Matrix / Binary Background ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(5, 1, 10, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00fff2";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>
