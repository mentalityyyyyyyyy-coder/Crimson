<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #030303;
  color: #ff003c;
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* animated grid background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(255,0,60,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,60,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  z-index: -2;
}

@keyframes moveGrid {
  from { transform: translateY(0); }
  to { transform: translateY(40px); }
}

/* glow overlay */
.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,0,60,0.15), transparent 70%);
  z-index: -1;
}

/* container */
.container {
  text-align: center;
  margin-top: 12vh;
}

/* title */
.title {
  font-size: 60px;
  letter-spacing: 6px;
  position: relative;
  display: inline-block;
}

/* cleaner glitch */
.title::before,
.title::after {
  content: "CRIMSON";
  position: absolute;
  left: 0;
}

.title::before {
  color: #00ffff;
  transform: translateX(-2px);
  animation: glitch1 2s infinite;
}

.title::after {
  color: #ff00ff;
  transform: translateX(2px);
  animation: glitch2 2s infinite;
}

@keyframes glitch1 {
  0%,100% { clip-path: inset(0 0 0 0); }
  50% { clip-path: inset(0 0 60% 0); }
}

@keyframes glitch2 {
  0%,100% { clip-path: inset(0 0 0 0); }
  50% { clip-path: inset(60% 0 0 0); }
}

/* subtitle */
.subtitle {
  color: #aaa;
  margin-top: 10px;
  margin-bottom: 30px;
}

/* binary typing */
.binary {
  font-size: 14px;
  color: #ff003c88;
  height: 20px;
  margin-bottom: 40px;
}

/* panel */
.panel {
  display: inline-block;
  padding: 25px;
  border: 1px solid #ff003c;
  border-radius: 12px;
  box-shadow: 0 0 20px #ff003c33;
  background: rgba(0,0,0,0.6);
}

/* buttons */
button {
  background: transparent;
  border: 1px solid #ff003c;
  color: #ff003c;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: 0.2s;
}

button:hover {
  background: #ff003c;
  color: black;
  box-shadow: 0 0 15px #ff003c;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="container">
  <h1 class="title">CRIMSON</h1>
  <p class="subtitle">the tools you ACTUALLY need.</p>

  <div class="binary" id="binary"></div>

  <div class="panel">
    <button>Scanner</button>
    <button>Analyzer</button>
    <button>Logs</button>
    <button>Tools</button>
  </div>
</div>

<script>
const el = document.getElementById("binary");

function randomBinary(length) {
  let str = "";
  for (let i = 0; i < length; i++) {
    str += Math.random() > 0.5 ? "1" : "0";
  }
  return str;
}

function animateBinary() {
  let text = randomBinary(40);
  let i = 0;

  function type() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      i++;
      setTimeout(type, 30);
    } else {
      setTimeout(() => {
        erase();
      }, 500);
    }
  }

  function erase() {
    if (i >= 0) {
      el.textContent = text.slice(0, i);
      i--;
      setTimeout(erase, 15);
    } else {
      animateBinary();
    }
  }

  type();
}

animateBinary();
</script>

</body>
</html>
