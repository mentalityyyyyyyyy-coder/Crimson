<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRIMSON</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
}

body {
  background: #050008;
  overflow-x: hidden;
  color: #ff2a3d;
}

/* ===== MATRIX BACKGROUND ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* ===== MAIN UI ===== */
.container {
  text-align: center;
  padding-top: 80px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 72px;
  letter-spacing: 12px;
  color: #ff1e2f;
  text-shadow:
    0 0 10px #ff1e2f,
    0 0 25px #ff1e2f,
    0 0 60px #8b0012;
  animation: glow 2s infinite alternate;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #ff5a6a;
  opacity: 0.9;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff1e2f; }
  to { text-shadow: 0 0 35px #ff1e2f, 0 0 80px #8b0012; }
}

/* ===== DROPDOWN ===== */
.dropdown {
  width: 60%;
  margin: 30px auto;
  position: relative;
}

/* ===== CYBERPUNK BUTTON ===== */
.dropdown button {
  width: 100%;
  padding: 18px 22px;
  background: linear-gradient(135deg, rgba(20,0,10,0.95), rgba(40,0,15,0.85));
  color: #ff2a3d;
  font-size: 20px;
  border: 1px solid rgba(255,30,47,0.6);
  cursor: pointer;
  text-align: left;

  /* angled cyberpunk shape */
  clip-path: polygon(
    0 0,
    92% 0,
    100% 35%,
    100% 100%,
    8% 100%,
    0 65%
  );

  position: relative;
  overflow: hidden;

  box-shadow:
    0 0 10px rgba(255,30,47,0.25),
    inset 0 0 10px rgba(255,30,47,0.15);

  transition: 0.3s;
}

/* glow pulse */
.dropdown button::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,30,47,0.25), transparent 60%);
  opacity: 0;
  transition: 0.4s;
}

/* scan line */
.dropdown button::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -30%;
  width: 30%;
  height: 200%;
  background: linear-gradient(
    to right,
    transparent,
    rgba(255,30,47,0.4),
    transparent
  );
  transform: rotate(25deg);
  opacity: 0;
}

/* hover effects */
.dropdown button:hover {
  transform: scale(1.03);
  box-shadow:
    0 0 25px rgba(255,30,47,0.6),
    inset 0 0 15px rgba(255,30,47,0.3);
}

.dropdown button:hover::before {
  opacity: 1;
}

.dropdown button:hover::after {
  opacity: 1;
  animation: scan 1.2s infinite;
}

@keyframes scan {
  0% { left: -40%; }
  100% { left: 120%; }
}

/* ===== DROPDOWN CONTENT ===== */
.dropdown-content {
  display: none;
  background: rgba(20,0,10,0.92);
  padding: 15px;
  border-left: 2px solid #ff1e2f;
  border-right: 2px solid #ff1e2f;
  box-shadow: 0 0 20px rgba(255,30,47,0.2);
  animation: slide 0.25s ease-in-out;
}

@keyframes slide {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ITEMS */
.item {
  padding: 10px;
  margin: 5px 0;
  border-left: 2px solid #ff1e2f;
  text-align: left;
  cursor: pointer;
  color: #ff8a93;
  transition: 0.2s;
}

.item:hover {
  background: rgba(255,30,47,0.15);
  color: white;
}

/* scanlines overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,30,47,0.04),
    rgba(255,30,47,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>CRIMSON</h1>
  <div class="subtitle">Tools that you ACTUALLY need.</div>

  <!-- GENERAL -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ General</button>
    <div class="dropdown-content">
      <div class="item">IP Lookup Tool</div>
      <div class="item">Password Strength Checker</div>
      <div class="item">Hash Generator</div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Games</button>
    <div class="dropdown-content">
      <div class="item">Cyber Escape Puzzle</div>
      <div class="item">Terminal Hacker Sim</div>
      <div class="item">Code Guess Game</div>
    </div>
  </div>

  <!-- FUN -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Fun</button>
    <div class="dropdown-content">
      <div class="item">Matrix Text Generator</div>
      <div class="item">Glitch Text Maker</div>
      <div class="item">ASCII Art Tool</div>
    </div>
  </div>
</div>

<script>
function toggle(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* ===== RED BINARY MATRIX ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(5, 0, 8, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ff1e2f";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>
