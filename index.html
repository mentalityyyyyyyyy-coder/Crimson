<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRIMSON</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
}

/* ================= BOOT SCREEN ================= */
#boot {
  position: fixed;
  inset: 0;
  background: #050008;
  color: #ff1e2f;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#boot h1 {
  font-size: 40px;
  letter-spacing: 8px;
  text-shadow: 0 0 20px #ff1e2f;
}

#bootText {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}

#progress {
  margin-top: 20px;
  font-size: 18px;
}

/* ================= MAIN SITE ================= */
body {
  background: #050008;
  overflow-x: hidden;
  color: #ff2a3d;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN */
.container {
  text-align: center;
  padding-top: 80px;
  display: none; /* hidden until boot finishes */
}

h1 {
  font-size: 72px;
  letter-spacing: 12px;
  color: #ff1e2f;
  text-shadow: 0 0 10px #ff1e2f, 0 0 40px #8b0012;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #ff5a6a;
}

/* DROPDOWNS */
.dropdown {
  width: 60%;
  margin: 30px auto;
}

.dropdown button {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, rgba(20,0,10,0.95), rgba(40,0,15,0.85));
  color: #ff2a3d;
  font-size: 20px;
  border: 1px solid rgba(255,30,47,0.6);
  cursor: pointer;
  text-align: left;
  clip-path: polygon(0 0, 92% 0, 100% 35%, 100% 100%, 8% 100%, 0 65%);
}

.dropdown-content {
  display: none;
  background: rgba(20,0,10,0.92);
  padding: 12px;
  border-left: 2px solid #ff1e2f;
}

/* ITEMS */
.item {
  padding: 10px;
  margin: 6px 0;
  border-left: 2px solid #ff1e2f;
  cursor: pointer;
  color: #ff8a93;
}

.item:hover {
  background: rgba(255,30,47,0.15);
  color: white;
}

/* LINKS */
a {
  color: inherit;
  text-decoration: none;
  display: block;
}

/* scanlines */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,30,47,0.04),
    rgba(255,30,47,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<!-- ================= BOOT SCREEN ================= -->
<div id="boot">
  <h1>CRIMSON SYSTEM</h1>
  <div id="bootText">Initializing neural interface...</div>
  <div id="progress">0%</div>
</div>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>CRIMSON</h1>
  <div class="subtitle">Tools that you ACTUALLY need.</div>

  <!-- GENERAL -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ General</button>
    <div class="dropdown-content">
      <div class="item">IP Lookup Tool</div>
      <div class="item">Password Strength Checker</div>
      <div class="item">Hash Generator</div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Games</button>
    <div class="dropdown-content">

      <!-- ROBLOX -->
      <div class="item">ROBLOX TOOLS</div>

      <div class="item"><a href="https://getsolara.dev/" target="_blank">Solara</a></div>
      <div class="item"><a href="https://www.xeno.now/" target="_blank">Xeno</a></div>
      <div class="item"><a href="https://realvelocity.xyz/" target="_blank">Velocity</a></div>
      <div class="item"><a href="https://yub-x.net/" target="_blank">YUB-X</a></div>

      <!-- OTHER GAMES -->
      <div class="item">MINECRAFT</div>
      <div class="item">FORTNITE</div>
      <div class="item">GEOMETRY DASH</div>

    </div>
  </div>

  <!-- FUN -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Fun</button>
    <div class="dropdown-content">
      <div class="item">Matrix Text Generator</div>
      <div class="item">Glitch Text Maker</div>
      <div class="item">ASCII Art Tool</div>
    </div>
  </div>
</div>

<script>

/* ================= BOOT SEQUENCE ================= */
let progress = 0;
const progressText = document.getElementById("progress");
const boot = document.getElementById("boot");
const container = document.querySelector(".container");

const messages = [
  "Initializing neural interface...",
  "Loading CRIMSON kernel...",
  "Decrypting modules...",
  "Syncing cyber network...",
  "Finalizing system access..."
];

let msgIndex = 0;
const bootText = document.getElementById("bootText");

const interval = setInterval(() => {
  progress++;

  progressText.innerText = progress + "%";

  if (progress % 20 === 0 && msgIndex < messages.length - 1) {
    msgIndex++;
    bootText.innerText = messages[msgIndex];
  }

  if (progress >= 100) {
    clearInterval(interval);

    setTimeout(() => {
      boot.style.opacity = "0";
      boot.style.transition = "1s";

      setTimeout(() => {
        boot.style.display = "none";
        container.style.display = "block";
      }, 1000);

    }, 500);
  }

}, 80);

/* ================= DROPDOWN ================= */
function toggle(btn) {
  const content = btn.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* ================= MATRIX ================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(5, 0, 8, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ff1e2f";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 35);

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>
