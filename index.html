<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRIMSON</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
}

/* ===== BOOT SCREEN ===== */
#boot {
  position: fixed;
  inset: 0;
  background: #050008;
  color: #ff1e2f;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#boot h1 {
  font-size: 40px;
  letter-spacing: 8px;
  text-shadow: 0 0 20px #ff1e2f;
}

#bootText {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

#progress {
  margin-top: 20px;
  font-size: 18px;
}

/* ===== MAIN SITE ===== */
body {
  background: #050008;
  overflow-x: hidden;
  color: #ff2a3d;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* fade in */
.container {
  text-align: center;
  padding-top: 80px;
  display: none;
  opacity: 0;
  transform: translateY(15px);
}

.container.show {
  animation: pageIn 1.2s ease forwards;
}

@keyframes pageIn {
  from {
    opacity: 0;
    transform: translateY(20px);
    filter: blur(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

/* TITLE */
h1 {
  font-size: 72px;
  letter-spacing: 12px;
  color: #ff1e2f;
  text-shadow: 0 0 10px #ff1e2f, 0 0 50px #8b0012;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #ff5a6a;
}

/* ===== DROPDOWNS ===== */
.dropdown {
  width: 60%;
  margin: 30px auto;
}

/* cyberpunk button */
.dropdown button {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, rgba(20,0,10,0.95), rgba(40,0,15,0.85));
  color: #ff2a3d;
  font-size: 20px;
  border: 1px solid rgba(255,30,47,0.6);
  cursor: pointer;
  text-align: left;

  clip-path: polygon(0 0, 92% 0, 100% 35%, 100% 100%, 8% 100%, 0 65%);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.dropdown button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 30px rgba(255,30,47,0.6);
}

/* dropdown content */
.dropdown-content {
  display: none;
  background: rgba(20,0,10,0.92);
  padding: 12px;
  border-left: 2px solid #ff1e2f;
  animation: drop 0.3s ease;
}

@keyframes drop {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.item {
  padding: 10px;
  margin: 6px 0;
  border-left: 2px solid #ff1e2f;
  color: #ff8a93;
  cursor: pointer;
}

.item:hover {
  background: rgba(255,30,47,0.15);
  color: white;
}

a {
  color: inherit;
  text-decoration: none;
}

/* scanlines */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,30,47,0.04),
    rgba(255,30,47,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <h1>CRIMSON SYSTEM</h1>
  <div id="bootText">Initializing core...</div>
  <div id="progress">0%</div>
</div>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>CRIMSON</h1>
  <div class="subtitle">Tools that you ACTUALLY need.</div>

  <!-- GENERAL -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ General</button>
    <div class="dropdown-content">
      <div class="item">IP Lookup Tool</div>
      <div class="item">Password Strength Checker</div>
      <div class="item">Hash Generator</div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Games</button>
    <div class="dropdown-content">

      <!-- ROBLOX DROPDOWN -->
      <div class="dropdown">
        <button onclick="toggle(this)">▶ Roblox Tools</button>
        <div class="dropdown-content">
          <div class="item"><a href="https://getsolara.dev/" target="_blank">Solara</a></div>
          <div class="item"><a href="https://www.xeno.now/" target="_blank">Xeno</a></div>
          <div class="item"><a href="https://realvelocity.xyz/" target="_blank">Velocity</a></div>
          <div class="item"><a href="https://yub-x.net/" target="_blank">YUB-X</a></div>
        </div>
      </div>

      <div class="item">Minecraft</div>
      <div class="item">Fortnite</div>
      <div class="item">Geometry Dash</div>

    </div>
  </div>

  <!-- FUN -->
  <div class="dropdown">
    <button onclick="toggle(this)">▶ Fun</button>
    <div class="dropdown-content">
      <div class="item">Matrix Text Generator</div>
      <div class="item">Glitch Text Maker</div>
      <div class="item">ASCII Art Tool</div>
    </div>
  </div>
</div>

<script>

/* ===== BOOT ANIMATION (slow → fast → slow) ===== */
let progress = 0;
const progressText = document.getElementById("progress");
const boot = document.getElementById("boot");
const container = document.querySelector(".container");
const bootText = document.getElementById("bootText");

const messages = [
  "Initializing core...",
  "Loading modules...",
  "Syncing system...",
  "Injecting UI...",
  "Finalizing access..."
];

let msg = 0;

function speed(p) {
  if (p < 25) return 80;
  if (p < 75) return 25;
  return 90;
}

function loop() {
  setTimeout(() => {
    progress++;
    progressText.innerText = progress + "%";

    if (progress % 20 === 0 && msg < messages.length - 1) {
      msg++;
      bootText.innerText = messages[msg];
    }

    if (progress >= 100) {
      boot.style.display = "none";
      container.style.display = "block";
      setTimeout(() => container.classList.add("show"), 50);
      return;
    }

    loop();
  }, speed(progress));
}

loop();

/* dropdown */
function toggle(btn) {
  const c = btn.nextElementSibling;
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* matrix */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const size = 14;
const cols = canvas.width / size;
const drops = Array(Math.floor(cols)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(5,0,8,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff1e2f";
  ctx.font = size + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const t = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(t, i*size, drops[i]*size);

    if (drops[i]*size > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(draw, 35);
window.addEventListener("resize", () => location.reload());

</script>

</body>
</html>
